# Quantumult X 自用配置
# 2025-05-21

# 「通知」栏中，建议仅开启[策略检测通知]和[脚本通知]开关，「VPN」栏中，建议关闭[兼容性增强]、[分流匹配优化]和[MPM]开关

# 建议在「其他设置」里「GeoLite2」的「来源」填写使用下面链接「任选一个」，并开启「自动更新」
;https://raw.githubusercontent.com/Loyalsoldier/geoip/release/Country.mmdb
;https://github.com/Hackl0us/GeoIP2-CN/raw/release/Country.mmdb

[general]
# 直连测试URL
network_check_url = http://www.baidu.com

# 代理测试URL
server_check_url = http://www.google.com

# 测试超时（毫秒）
server_check_timeout = 2000

# 设置图标显示
profile_img_url = https://raw.githubusercontent.com/Kabiso413/VPN_Tool/main/Surge/Icon/Quantumult-X.png

# 显示节点IP地址(以下任选一个即可)
geo_location_checker = disabled
;geo_location_checker = http://ip-api.com/json/?lang=zh-CN, https://raw.githubusercontent.com/KOP-XIAO/QuantumultX/master/Scripts/IP_API.js

# 资源解析器
resource_parser_url = https://raw.githubusercontent.com/KOP-XIAO/QuantumultX/master/Scripts/resource-parser.js

# 排除路线
excluded_routes = 239.255.255.250/32, 24.105.30.129/32, 185.60.112.157/32, 185.60.112.158/32, 182.162.132.1/32

# DNS排除列表
dns_exclusion_list = *.cmpassport.com, *.jegotrip.com.cn, *.icitymobile.mobi, id6.me, *.pingan.com.cn, *.cmbchina.com

# UDP丢弃列表
udp_drop_list = 443

# 第一个filter为4g模式开启规则分流，第二个filter为其他wifi下开启规则分流，第三个wifi1修改成你路由器翻墙的wifi名开启直连模式，第四个wifi2为其他有路由器翻墙的WiFi名走直连（默认关闭根据WiFi切换模式，如需开启，删除下方的";"即可）
;running_mode_trigger = filter, filter, wifi1:all_direct, wifi2:all_direct

[dns]
# Quantumult X 开启IPv6方法，删去下面的「no-ipv6」，在「VPN」栏中，开启「兼容性增强」

# 禁用系统DNS/IPv6
no-system
no-ipv6

# DNS over HTTP/3
prefer-doh3

# 自定义 DNS 服务器
server = 223.5.5.5
server = 119.29.29.29

# 自定义 DoH 服务器
doh-server = https://dns.alidns.com/dns-query, https://doh.pub/dns-query

