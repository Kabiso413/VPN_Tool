ZTS DO Pages = trojan, cf.zhetengsha.eu.org, 2096, password=0fd9b883-0551-4ed1-b978-528183b459a2, ws=true, ws-path=/proxyIP=proxyip.digitalocean.fxxk.dedyn.io, ws-headers=Host:"db.kabiso413.dns-dynamic.net", block-quic=on, skip-cert-verify=true, sni=db.kabiso413.dns-dynamic.net
ZTS Oracle Pages = trojan, cf.zhetengsha.eu.org, 2096, password=0fd9b883-0551-4ed1-b978-528183b459a2, ws=true, ws-path=/proxyIP=proxyip.oracle.fxxk.dedyn.io, ws-headers=Host:"db.kabiso413.dns-dynamic.net", block-quic=on, skip-cert-verify=true, sni=db.kabiso413.dns-dynamic.net
