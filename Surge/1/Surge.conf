[Proxy Group]
# ------------------------------------
# 地区节点
香港节点 = smart, policy-regex-filter=^(?=.*(🇭🇰|香港|HK|(?i)HongKong))(?!.*(?i)(WARP|Workers|Pages|Free|(?<![\d\.])[2-5]x)).*$, no-alert=0, hidden=1, include-all-proxies=0, include-other-group=机场订阅, icon-url=https://raw.githubusercontent.com/Kabiso413/VPN_Tool/main/Surge/Icon/HK.png
台湾节点 = smart, policy-regex-filter=^(?=.*(🇨🇳|台湾|TW|(?i)Taiwan))(?!.*(?i)(WARP|Workers|Pages|Free|(?<![\d\.])[2-5]x)).*$, no-alert=0, hidden=1, include-all-proxies=0, include-other-group=机场订阅, icon-url=https://raw.githubusercontent.com/Kabiso413/VPN_Tool/main/Surge/Icon/CN.png
日本节点 = smart, policy-regex-filter=^(?=.*(🇯🇵|日本|JP|(?i)Japan))(?!.*(?i)(WARP|Workers|Pages|Free|(?<![\d\.])[2-5]x)).*$, no-alert=0, hidden=1, include-all-proxies=0, include-other-group=机场订阅, icon-url=https://raw.githubusercontent.com/Kabiso413/VPN_Tool/main/Surge/Icon/JP.png
韩国节点 = smart, policy-regex-filter=^(?=.*(🇰🇷|韩国|KR|(?i)Korea))(?!.*(?i)(WARP|Workers|Pages|Free|(?<![\d\.])[2-5]x)).*$, no-alert=0, hidden=1, include-all-proxies=0, include-other-group=机场订阅, icon-url=https://raw.githubusercontent.com/Kabiso413/VPN_Tool/main/Surge/Icon/KR.png
新国节点 = smart, policy-regex-filter=^(?=.*(🇸🇬|新加坡|狮城|SG|(?i)Singapore))(?!.*(?i)(WARP|Workers|Pages|Free|(?<![\d\.])[2-5]x)).*$, no-alert=0, hidden=1, include-all-proxies=0, include-other-group=机场订阅, icon-url=https://raw.githubusercontent.com/Kabiso413/VPN_Tool/main/Surge/Icon/SG.png
美国节点 = smart, policy-regex-filter=^(?=.*(🇺🇸|美国|US|(?i)States))(?!.*(?i)(WARP|Workers|Pages|Free|(?<![\d\.])[2-5]x)).*$, no-alert=0, hidden=1, include-all-proxies=0, include-other-group=机场订阅, icon-url=https://raw.githubusercontent.com/Kabiso413/VPN_Tool/main/Surge/Icon/US.png
# ------------------------------------
# 兜底策略
全球手动 = select, no-alert=0, hidden=0, include-all-proxies=0, include-other-group=机场订阅, icon-url=https://raw.githubusercontent.com/Kabiso413/VPN_Tool/main/Surge/Icon/Global.png
超低倍率 = smart, policy-regex-filter=(0\.[1-9]x), no-alert=0, hidden=0, include-all-proxies=0, include-other-group=机场订阅, icon-url=https://raw.githubusercontent.com/Kabiso413/VPN_Tool/main/Surge/Icon/Low.png
本地节点 = smart, "ZTS Alibaba Pages", "ZTS DO Pages", "ZTS Oracle Pages", "ZTS Vultr Pages", no-alert=0, hidden=0, include-all-proxies=0, icon-url=https://raw.githubusercontent.com/Kabiso413/VPN_Tool/main/Surge/Icon/Cloudflare.png
兜底后备 = select, 香港节点, 台湾节点, 日本节点, 韩国节点, 新国节点, 美国节点, 全球手动, 超低倍率, 本地节点, no-alert=0, hidden=0, include-all-proxies=0, icon-url=https://raw.githubusercontent.com/Kabiso413/VPN_Tool/main/Surge/Icon/Final.png
# ------------------------------------
# 机场订阅
机场订阅 = select, policy-path=订阅地址, update-interval=0, no-alert=0, hidden=1, include-all-proxies=0, icon-url=https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/apps/Surge_01.png

