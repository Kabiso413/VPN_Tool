# Surge 自用配置
# 2025-04-30
# 更多模块: https://surge.qingr.moe

[General]
# 增强版 Wi-Fi 助理
wifi-assist = false

# 混合网络
all-hybrid = false

# 游戏优化
udp-priority = false

# INTERNET 测试 URL
internet-test-url = http://www.baidu.com

# 代理测速
proxy-test-url = http://www.google.com

# 测试超时（秒）
test-timeout = 2

# GEOIP 数据库 URL
geoip-maxmind-url = https://raw.githubusercontent.com/Masaiki/GeoIP2-CN/release/Country.mmdb

# GEOIP 数据库自动更新
disable-geoip-db-auto-update = false

# IPv6 DNS 查询
ipv6 = false

# IPv6 VIF
ipv6-vif = disabled

# 接管模式
compatibility-mode = 0

# 允许 Wi-Fi 访问
allow-wifi-access = true

# 允许个人热点访问
allow-hotspot-access = false

# HTTP 代理服务端口
wifi-access-http-port = 6152

# SOCKS5 代理服务端口
wifi-access-socks5-port = 6153

# HTTP API
http-api = Kabiso413@127.0.0.1:6171

# HTTPS
http-api-tls = true

# Web 控制器
http-api-web-dashboard = true

# 日志等级
loglevel = notify

# 显示拒绝错误页
show-error-page-for-reject = true

# 排除简单主机名
exclude-simple-hostnames = true

# UDP 回退行为
udp-policy-not-supported-behaviour = REJECT

# DNS 服务器
dns-server = 223.5.5.5, 119.29.29.29

[Proxy]
# ------------------------------------
# 本地节点
Cloudflare Pages = trojan, 104.16.115.145, 8443, password=0fd9b883-0551-4ed1-b978-528183b459a2, skip-cert-verify=true, sni=db.kabiso413.dns-dynamic.net, ws=true, ws-path=/proxyIP=proxyip.us.fxxk.dedyn.io, ws-headers=HOST:"db.kabiso413.dns-dynamic.net"

[Proxy Group]
# ------------------------------------
# 地区节点
香港节点 = smart, include-other-group=全球手动, no-alert=0, hidden=1, include-all-proxies=0, policy-regex-filter=(?=.*(🇭🇰|香港|HK|(?i)HongKong))^(?!.*(WARP|Workers|Pages|2x|3x)).*$, icon-url=https://raw.githubusercontent.com/Kabiso413/VPN_Tool/main/Surge/Icon/HK.png
台湾节点 = smart, include-other-group=全球手动, no-alert=0, hidden=1, include-all-proxies=0, policy-regex-filter=(?=.*(🇨🇳|台湾|TW|(?i)Taiwan))^(?!.*(WARP|Workers|Pages|2x|3x)).*$, icon-url=https://raw.githubusercontent.com/Kabiso413/VPN_Tool/main/Surge/Icon/CN.png
日本节点 = smart, include-other-group=全球手动, no-alert=0, hidden=1, include-all-proxies=0, policy-regex-filter=(?=.*(🇯🇵|日本|JP|(?i)Japan))^(?!.*(WARP|Workers|Pages|2x|3x)).*$, icon-url=https://raw.githubusercontent.com/Kabiso413/VPN_Tool/main/Surge/Icon/JP.png
韩国节点 = smart, include-other-group=全球手动, no-alert=0, hidden=1, include-all-proxies=0, policy-regex-filter=(?=.*(🇰🇷|韩国|KR|(?i)Korea))^(?!.*(WARP|Workers|Pages|2x|3x)).*$, icon-url=https://raw.githubusercontent.com/Kabiso413/VPN_Tool/main/Surge/Icon/KR.png
新国节点 = smart, include-other-group=全球手动, no-alert=0, hidden=1, include-all-proxies=0, policy-regex-filter=(?=.*(🇸🇬|新加坡|狮城|SG|(?i)Singapore))^(?!.*(WARP|Workers|Pages|2x|3x)).*$, icon-url=https://raw.githubusercontent.com/Kabiso413/VPN_Tool/main/Surge/Icon/SG.png
美国节点 = smart, include-other-group=全球手动, no-alert=0, hidden=1, include-all-proxies=0, policy-regex-filter=(?=.*(🇺🇸|美国|US|(?i)States))^(?!.*(WARP|Workers|Pages|2x|3x)).*$, icon-url=https://raw.githubusercontent.com/Kabiso413/VPN_Tool/main/Surge/Icon/US.png
# ------------------------------------
# 兜底策略
全球手动 = select, policy-path=机场订阅, update-interval=0, no-alert=0, hidden=0, include-all-proxies=0, icon-url=https://raw.githubusercontent.com/Kabiso413/VPN_Tool/main/Surge/Icon/Global.png
超低倍率 = smart, include-other-group=全球手动, no-alert=0, hidden=1, include-all-proxies=0, policy-regex-filter=(0\.[1-9]x), icon-url=https://raw.githubusercontent.com/Kabiso413/VPN_Tool/main/Surge/Icon/Low.png
本地节点 = smart, "Cloudflare Pages", policy-path=本地订阅, update-interval=0, no-alert=0, hidden=1, include-all-proxies=0, icon-url=https://raw.githubusercontent.com/Kabiso413/VPN_Tool/main/Surge/Icon/Cloudflare.png
兜底后备 = select, 香港节点, 台湾节点, 日本节点, 韩国节点, 新国节点, 美国节点, 全球手动, 超低倍率, 本地节点, no-alert=0, hidden=0, include-all-proxies=0, icon-url=https://raw.githubusercontent.com/Kabiso413/VPN_Tool/main/Surge/Icon/Final.png

